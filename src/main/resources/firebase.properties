# Firebase configuration for authentication + Firestore.
# You can also set FIREBASE_API_KEY and FIREBASE_PROJECT_ID as environment variables.
firebase.apiKey=YOUR_FIREBASE_API_KEY
firebase.projectId=YOUR_FIREBASE_PROJECT_ID

# Google OAuth (for Google Sign-In) - Desktop app credentials from Google Cloud Console.
# You can also set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as environment variables.
google.clientId=YOUR_GOOGLE_CLIENT_ID
google.clientSecret=YOUR_GOOGLE_CLIENT_SECRET
